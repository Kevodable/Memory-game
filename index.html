<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header>
      <h1>🧠 Memory Game</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Mosse</span>
          <span id="moves" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Tempo</span>
          <span id="timer" class="stat-value">00:00</span>
        </div>
        <div class="stat">
          <span class="stat-label">Coppie</span>
          <span id="pairs" class="stat-value">0/8</span>
        </div>
      </div>
      <div class="controls">
        <button id="restart-btn">🔄 Nuova partita</button>
        <select id="difficulty">
          <option value="8">Facile (4x4)</option>
          <option value="18">Difficile (6x6)</option>
        </select>
      </div>
    </header>

    <main id="board" class="board"></main>

    <div id="win-overlay" class="overlay hidden">
      <div class="win-card">
        <h2>🎉 Hai vinto!</h2>
        <p>Mosse: <span id="final-moves"></span></p>
        <p>Tempo: <span id="final-time"></span></p>
        <button id="play-again-btn">Gioca ancora</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
